name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# cancel superseded in-progress runs for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # run pre-commit via uv (avoids pre-commit/action, which still pins the
      # Node 20 actions/cache@v4 internally)
      - run: uvx pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # installs uv, provisions Python from .python-version, and caches ~/.cache/uv
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --verbose --block-network --cov=src --cov-fail-under=80 tests/
