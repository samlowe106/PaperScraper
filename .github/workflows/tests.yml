name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prepare:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          ver=$(cat .python-version | tr -d ' \n')
          echo "matrix=[\"$ver\"]" >> $GITHUB_OUTPUT

  test:
    permissions:
      contents: read
      pull-requests: write
    env:
      REDDIT_CLIENT_ID: "mock reddit client id"
      REDDIT_CLIENT_SECRET: "mock reddit client secret"
      IMGUR_CLIENT_ID: "mock reddit client secret"
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
            path: ~/.cache/uv
            key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync environment
        run: uv sync

      - name: Run tests
        run: uv run pytest --verbose --block-network --cov=. tests/
