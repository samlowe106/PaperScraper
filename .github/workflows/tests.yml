name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# cancel superseded in-progress runs for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      # runs every hook in .pre-commit-config.yaml (ruff, black, mypy, ...)
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # installs uv, provisions Python from .python-version, and caches ~/.cache/uv
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ --verbose --block-network --cov=src --cov-fail-under=80
